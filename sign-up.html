<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-in</title>
    <link rel="stylesheet" href="css/sign-up.css">
</head>
<body>
    <section class="form">
        <form>
            <label for="t1">First name</label>
            <input type="text" id="t1" name="first name" placeholder="First name">
            <label for="t2">Surname</label>
            <input id="t2" type="text" name="surname" placeholder="Surname">
            <label for="t3">Username</label>
            <input id="t3" type="text" name="username" placeholder="Type username">
            <label for="t4">Password</label>
            <input id="t4" type="text" name="Password" placeholder="Set account password">
            <label for="e1">Email address</label>
            <input id="e1" name="Email address" placeholder="input Email address">
            <label for="p1">Password</label>
            <input id="p1" name="Email password" placeholder="Type email password">
            <button type="submit"><a>Sign in</a></button>
            <p>OR</p>
            <p>Already have an account?</p>
            <p><a href="log-in.html">Log in</a></p>
            </form>
    </section>
</body>
</html>
